<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Aula CSS - Interno | Caio Picciarelli</title>
</head>

<style>
	.card{
		width: 500px;
		height: fit-content;
		background-color: transparent;
		border: solid 1px navy;
		margin: 30px;
		padding: 40px;
	}

	.border{
		border-radius: 20px;
	}

	.icone1{
		width: 100px;
		height: 100px;
		background-image: url('https://cdn-icons-png.flaticon.com/512/706/706830.png');
		background-size: cover;
		/* background-repeat: no-repeat;
		background-position: center; */

	}

	.icone2{
		width: 100px;
		height: 100px;
		background-image: url('https://cdn-icons-png.flaticon.com/256/3681/3681928.png');
		background-size: cover;
		/* background-repeat: no-repeat;
		background-position: center; */

	}

	.text{
		font-family: Arial, Helvetica, sans-serif;
	}

	.title{
		font-size: 30px;
	}

	.main-color{
		color: navy;
	}

	p{
		font-size: 15px;
	}

	.italic{
		font-style: italic;
	}
</style>

<body>
	<!--
	Fix-content - O content de ajusta conforme os elementos
	solid = linha continua | tem linha pontilhada tbm etc.
	// inbutido = inline
	// interno - tag <style></style>
	// externo - arquivo.css
	// class="card border" - ideal para estilizar cards iguais, porém com caracteristicas diferentes.
	-->

	<div class="card border">

		<div class="icone1 border">
			
		</div>

		<div>
			<h1 class="text title">
				Meu nome é: <span class="main-color">Adriana</span>
			</h1>

			<p class="text">
				Mensagem:
				<span class="main-color italic">A vida não é um morango! E tá tudo bem!</span>
			</p>
		</div>
	</div>

	<div class="card border">

		<div class="icone2 border">

		</div>

		<div>
			<h1 class="text title">
				Meu nome é: <span class="main-color">Hugo</span>
			</h1>

			<p class="text">
				Mensagem:
				<span class="main-color italic">Um dia é da caça, o outro é do caçador.</span>
			</p>
		</div>
	</div>

</body>

</html>
